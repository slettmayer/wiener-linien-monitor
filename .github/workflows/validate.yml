name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
          ignore: brands

  lint:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check custom_components/
      - run: ruff format --check custom_components/

  test:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-asyncio aiohttp voluptuous homeassistant
      - run: pytest tests/ -v

  gate:
    name: gate
    needs: [validate-hacs, lint, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check validation results
        run: |
          if [[ "${{ needs.validate-hacs.result }}" == "success" && \
                "${{ needs.lint.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" ]]; then
            echo "All checks passed"
            exit 0
          else
            echo "One or more checks failed"
            exit 1
          fi
